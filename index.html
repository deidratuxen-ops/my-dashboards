<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Floor Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="dashboard-frame" src="" allowFullScreen="true"></iframe>

    <script>
        const urls = [
            "https://app.powerbi.com/reportEmbed?reportId=91e9d1c1-8674-4c55-bd71-ddf88410fa53&autoAuth=true&ctid=a871fdca-22af-4ddd-b902-f381041deaa3&pageName=a7d9f8cc2060d02ce20a",
            "https://app.powerbi.com/reportEmbed?reportId=91e9d1c1-8674-4c55-bd71-ddf88410fa53&autoAuth=true&ctid=a871fdca-22af-4ddd-b902-f381041deaa3&pageName=197fc9e8fa42206b93df"
        ];

        // 1. This checks the URL to see if it should load plot 0 or plot 1
        const urlParams = new URLSearchParams(window.location.search);
        let index = parseInt(urlParams.get('idx')) || 0;

        // 2. Set the frame to the current plot
        document.getElementById('dashboard-frame').src = urls[index];

        // 3. THE MAGIC: Instead of just changing the iframe, we RELOAD the whole page.
        // This clears 'stuck' logos and forces a fresh authentication handshake.
        setTimeout(() => {
            let nextIndex = (index + 1) % urls.length;
            // This sends the browser back to your GitHub page with the next index
            window.location.href = `https://deidra-cornelius.github.io/my-dashboards/?idx=${nextIndex}`;
        }, 120000); // 120000 = 2 minutes
    </script>
</body>
</html>
