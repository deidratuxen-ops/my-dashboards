<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Shop Floor Rotator</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="dashboard-frame" src="" allowFullScreen="true"></iframe>

    <script>
        // Use the link you provided as the base
        const baseUrl = "https://app.powerbi.com/reportEmbed?reportId=91e9d1c1-8674-4c55-bd71-ddf88410fa53&autoAuth=true&ctid=a871fdca-22af-4ddd-b902-f381041deaa3";

        // Add your specific PageNames to the end of the base URL
        // Replace 'ReportSection1' and 'ReportSection2' with what you find in your browser bar
        const urls = [
            baseUrl + "&pageName=a7d9f8cc2060d02ce20a", 
            baseUrl + "&pageName=197fc9e8fa42206b93df"
        ];

        let currentIndex = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotate() {
            console.log("Loading Page: " + (currentIndex + 1));
            frame.src = urls[currentIndex];
            currentIndex = (currentIndex + 1) % urls.length;
        }

        rotate(); // Load first page
        setInterval(rotate, 120000); // 2 minute rotation
    </script>
</body>
</html>
