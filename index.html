<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Public Shop Floor Rotator</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="dashboard-frame" src="" allowFullScreen="true"></iframe>

    <script>
        // We use 'reportEmbed' instead of 'view' to bypass security/loading hangs
        const baseUrl = "https://app.powerbi.com/reportEmbed?r=eyJrIjoiNmQ5Y2M5ZTktNWJiYi00ZDY2LThhYmUtMjc2YTE5YzIyNmUzIiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9";

        const urls = [
            baseUrl + "&pageName=a7d9f8cc2060d02ce20a", 
            baseUrl + "&pageName=197fc9e8fa42206b93df"
        ];

        let currentIndex = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotate() {
            // This 'src = ""' trick forces the browser to clear its memory before loading
            frame.src = ""; 
            setTimeout(() => {
                frame.src = urls[currentIndex];
                currentIndex = (currentIndex + 1) % urls.length;
            }, 100);
        }

        rotate();
        setInterval(rotate, 120000); // 2 minutes
    </script>
</body>
</html>
