<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Floor Rotator</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="dashboard-frame" src="" allowFullScreen="true"></iframe>

    <script>
        /**
         * NOTE: I am using "reportEmbed" instead of "view" here. 
         * This is the "Magic Trick" that usually bypasses the 'Refused to Connect' error.
         **/
        const baseUrl = "https://app.powerbi.com/reportEmbed?r=eyJrIjoiNmQ5Y2M5ZTktNWJiYi00ZDY2LThhYmUtMjc2YTE5YzIyNmUzIiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9";

        const urls = [
            baseUrl + "&pageName=a7d9f8cc2060d02ce20a", // Your first plot
            baseUrl + "&pageName=197fc9e8fa42206b93df"  // Your second plot
        ];

        let currentIndex = 0;
        const frame = document.getElementById('dashboard-frame');

        function rotate() {
            console.log("Switching to: " + urls[currentIndex]);
            frame.src = urls[currentIndex];
            currentIndex = (currentIndex + 1) % urls.length;
        }

        rotate(); // Load first page immediately
        setInterval(rotate, 45000); // Swap every 45 seconds
    </script>
</body>
</html>
