<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plant Operations Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="display-container" style="height: 100vh; width: 100vw;"></div>

    <script>
        // THE 4 NEW PUBLIC LINKS
        const urls = [
            "https://app.powerbi.com/view?r=eyJrIjoiZDExZGMyNmYtNDZkOC00ZmJlLWIyZTctYWEwZWIzYTM1N2EwIiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9",
            "https://app.powerbi.com/view?r=eyJrIjoiOWExMmEyNmQtN2YyOS00ODc4LWI0OGEtNWI4NGM3OGMwOThhIiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9",
            "https://app.powerbi.com/view?r=eyJrIjoiMzJjYjg3ZGEtYjUzYi00MDc2LTkzMTItOTI4MGVkMGE3YWM2IiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9",
            "https://app.powerbi.com/view?r=eyJrIjoiZmI1ZDJjMWEtZWU3Yy00Y2YzLWEzMzAtZDliMjY5YzUzNzRkIiwidCI6ImE4NzFmZGNhLTIyYWYtNGRkZC1iOTAyLWYzODEwNDFkZWFhMyJ9"
        ];

        // Track the current index via URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let index = parseInt(urlParams.get('idx')) || 0;

        // Display the current plot
        document.getElementById('display-container').innerHTML = 
            `<iframe src="${urls[index]}" allowFullScreen="true"></iframe>`;

        // 30 SECOND ROTATION (30000ms)
        setTimeout(() => {
            let nextIndex = (index + 1) % urls.length;
            window.location.href = `https://deidratuxen-ops.github.io/my-dashboards/?idx=${nextIndex}`;
        }, 30000); 
    </script>
</body>
</html>
