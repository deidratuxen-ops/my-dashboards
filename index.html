<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Floor Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="dashboard-frame" src="" allowFullScreen="true"></iframe>

    <script>
        // These are your INTERNAL links with 'chromeless' to help the old Fire Stick
        const urls = [
            "https://app.powerbi.com/reportEmbed?reportId=91e9d1c1-8674-4c55-bd71-ddf88410fa53&autoAuth=true&ctid=a871fdca-22af-4ddd-b902-f381041deaa3&pageName=a7d9f8cc2060d02ce20a&chromeless=1",
            "https://app.powerbi.com/reportEmbed?reportId=91e9d1c1-8674-4c55-bd71-ddf88410fa53&autoAuth=true&ctid=a871fdca-22af-4ddd-b902-f381041deaa3&pageName=197fc9e8fa42206b93df&chromeless=1"
        ];

        // 1. Check the URL for the index (?idx=0 or ?idx=1)
        const urlParams = new URLSearchParams(window.location.search);
        let index = parseInt(urlParams.get('idx')) || 0;

        // 2. Set the frame to the current plot
        document.getElementById('dashboard-frame').src = urls[index];

        // 3. THE ROTATOR: After 2 mins, refresh to the CORRECT new URL
        setTimeout(() => {
            let nextIndex = (index + 1) % urls.length;
            // UPDATED URL BELOW
            window.location.href = `https://deidratuxen-ops.github.io/my-dashboards/?idx=${nextIndex}`;
        }, 120000); 
    </script>
</body>
</html>
