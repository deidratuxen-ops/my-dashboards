<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Floor Dashboard Rotator</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="dashboard-frame" src=""></iframe>

    <script>
        // PASTE YOUR POWER BI "PUBLISH TO WEB" LINKS HERE
        const urls = [
            "https://app.powerbi.com/groups/9356ed47-a422-455a-b7f7-5266d12c06dc/reports/91e9d1c1-8674-4c55-bd71-ddf88410fa53/a7d9f8cc2060d02ce20a?experience=power-bipageName=a7d9f8cc2060d02ce20a",
            "https://app.powerbi.com/groups/9356ed47-a422-455a-b7f7-5266d12c06dc/reports/91e9d1c1-8674-4c55-bd71-ddf88410fa53/197fc9e8fa42206b93df?experience=power-bi&pageName197fc9e8fa42206b93df"
        ];

        let currentIndex = 0;
        const displayTime = 45000; // 45 seconds in milliseconds
        const frame = document.getElementById('dashboard-frame');

        function rotateDashboard() {
            // Update the iframe source
            frame.src = urls[currentIndex];

            // Move to next index or loop back to start
            currentIndex = (currentIndex + 1) % urls.length;
        }

        // Initial trigger
        rotateDashboard();

        // Set the timer to rotate
        setInterval(rotateDashboard, displayTime);
    </script>
</body>
</html>
